name: Build SystemUI Media Fix

on:
  push:
    branches: [main, SystemUI-Fixer]
    paths:
      - 'zygisk/**'
      - 'module/**'
      - 'ci/**'
      - 'build.sh'
      - '.github/workflows/build-systemui-fix.yml'
  pull_request:
    paths:
      - 'zygisk/**'
      - 'module/**'
      - 'ci/**'
      - 'build.sh'
      - '.github/workflows/build-systemui-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 27.2.12479018

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Build module
        id: native_build
        shell: bash
        run: |
          set +e
          bash build.sh > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -E 'error:|undefined reference|ld.lld:|make: \*\*\*' build.log | tail -n 80 || true
          else
            cat build.log
          fi
          exit "$status"

      - name: Upload failed build log
        if: failure() && steps.native_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: native-build-log
          path: build.log
          if-no-files-found: error

      - name: Verify ELF hardening and exports
        run: bash ci/verify-elf.sh

      - name: Verify flashable ZIP
        run: |
          zip='dist/SystemUI-Media-Fix-v6.9.zip'
          test -f "$zip"
          unzip -l "$zip" | grep -q 'zygisk/arm64-v8a.so'
          if unzip -l "$zip" | grep -q 'armeabi-v7a'; then
            echo 'Unexpected 32-bit payload in ZIP' >&2
            exit 1
          fi

      - name: Upload flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: SystemUI-Media-Fix-v6.9
          path: dist/SystemUI-Media-Fix-v6.9.zip
          if-no-files-found: error

      - name: Publish GitHub release v6.9
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag='v6.9'
          zip='dist/SystemUI-Media-Fix-v6.9.zip'

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$zip" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --draft=false \
              --prerelease=false \
              --latest
          else
            gh release create "$tag" "$zip" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title 'SystemUI MediaMetadata NPE Fix v6.9' \
              --generate-notes \
              --latest
          fi
